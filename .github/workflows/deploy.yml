name: Deploy API to Production (Legacy - DISABLED)

# DISABLED: This workflow conflicts with deploy-production.yml (release-based deployment).
# Both triggered on push to main, causing race conditions and leaving the app in maintenance mode.
# Use deploy-production.yml instead.
on:
  workflow_dispatch: # Manual trigger only — no longer auto-deploys

jobs:
  security-gate:
    name: Pre-Deploy Security Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Sanctum token expiration check
        run: |
          if grep -q "'expiration' => null" config/sanctum.php; then
            echo "::error::CRITICAL: Sanctum token expiration is null!"
            exit 1
          fi

      - name: Debug endpoint check
        run: |
          if grep -rn "test-upload" routes/ --include="*.php" | grep -v "REMOVED\|//"; then
            echo "::error::Debug endpoints found in routes!"
            exit 1
          fi

      - name: Composer audit
        run: composer audit

  deploy:
    name: Deploy to Production
    needs: security-gate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /var/www/api.tesotunes.com
            git pull origin main
            composer install --no-dev --no-interaction --optimize-autoloader

            # Security gate — abort if issues found
            php artisan security:audit-routes --fail-on-issues
            php artisan security:audit-models --fail-on-issues

            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Post-deploy smoke test
            bash scripts/security-smoke-test.sh "https://api.tesotunes.com/api" || echo "⚠️ Security smoke test had warnings"

            echo "Deploy completed at $(date)"
