name: Deploy to Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  PHP_VERSION: '8.4'

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, zip
          tools: composer:v2

      # ---------------------------------------------------
      # Build production artifact
      # ---------------------------------------------------
      - name: Install dependencies (build stage)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Create deployment package
        run: |
          mkdir deployment
          rsync -av \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude=".env" \
            --exclude="storage/logs" \
            ./ deployment/

      - name: Compress artifact
        run: tar -czf deployment.tar.gz -C deployment .

      # ---------------------------------------------------
      # Upload to server
      # ---------------------------------------------------
      - name: Upload artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "deployment.tar.gz"
          target: "/tmp"

      # ---------------------------------------------------
      # Deploy on server
      # ---------------------------------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e

            APP_PATH="/var/www/api.tesotunes.com"
            SHARED_PATH="/var/www/tesotunes-shared"
            RELEASES_PATH="/var/www/tesotunes-releases"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            NEW_RELEASE="$RELEASES_PATH/$TIMESTAMP"

            echo "🚀 Starting deployment..."

            mkdir -p $SHARED_PATH
            mkdir -p $SHARED_PATH/storage
            mkdir -p $RELEASES_PATH
            mkdir -p $NEW_RELEASE

            # Extract new release
            tar -xzf /tmp/deployment.tar.gz -C $NEW_RELEASE
            rm -f /tmp/deployment.tar.gz

            cd $NEW_RELEASE

            # ------------------------------------------------
            # Link shared files
            # ------------------------------------------------
            if [ ! -f "$SHARED_PATH/.env" ]; then
              echo "❌ Missing .env in $SHARED_PATH"
              exit 1
            fi

            ln -sfn $SHARED_PATH/.env .env

            rm -rf storage
            ln -sfn $SHARED_PATH/storage storage

            # ------------------------------------------------
            # FIX: Required Laravel directories
            # ------------------------------------------------
            mkdir -p bootstrap/cache
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p storage/logs
            mkdir -p storage/app/public

            chmod -R 775 storage
            chmod -R 775 bootstrap/cache

            # ------------------------------------------------
            # Storage symlink (needed for local file serving)
            # ------------------------------------------------
            php artisan storage:link --force 2>/dev/null || true

            # ------------------------------------------------
            # Install dependencies safely
            # ------------------------------------------------
            echo "📦 Installing dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction --no-scripts

            php artisan package:discover --ansi

            # ------------------------------------------------
            # Maintenance mode on current release
            # ------------------------------------------------
            if [ -L "$APP_PATH" ]; then
              cd $APP_PATH
              php artisan down --retry=60 || true
              cd $NEW_RELEASE
            fi

            # ------------------------------------------------
            # Run migrations
            # ------------------------------------------------
            php artisan migrate --force

            # ------------------------------------------------
            # Atomic symlink switch
            # ------------------------------------------------
            ln -sfn $NEW_RELEASE $APP_PATH

            # ------------------------------------------------
            # Optimize
            # ------------------------------------------------
            php artisan config:cache
            php artisan route:cache
            php artisan event:cache

            php artisan up

            # Reload PHP-FPM to clear opcache and realpath cache
            sudo systemctl reload php8.4-fpm || sudo systemctl reload php-fpm || true

            # Restart workers
            sudo supervisorctl restart tesotunes-worker:* || true

            # ------------------------------------------------
            # Cleanup old releases (keep 5)
            # ------------------------------------------------
            cd $RELEASES_PATH
            ls -t | tail -n +6 | xargs rm -rf 2>/dev/null || true

            echo "✅ Deployment successful!"

      # ---------------------------------------------------
      # Health Check
      # ---------------------------------------------------
      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.tesotunes.com/api/health)
          if [ "$STATUS" -ne 200 ]; then
            echo "Health check failed"
            exit 1
          fi
          echo "API healthy"
