name: Deploy to Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  PHP_VERSION: '8.4'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, zip
          tools: composer:v2

      # ---------------------------------------------------
      # Build production artifact
      # ---------------------------------------------------
      - name: Install dependencies (build stage)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Create deployment package
        run: |
          mkdir deployment
          rsync -av \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude=".env" \
            --exclude="storage/logs" \
            ./ deployment/

      - name: Compress artifact
        run: tar -czf deployment.tar.gz -C deployment .

      # ---------------------------------------------------
      # Upload to server
      # ---------------------------------------------------
      - name: Upload artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "deployment.tar.gz"
          target: "/tmp"

      # ---------------------------------------------------
      # Deploy on server
      # ---------------------------------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -Eeuo pipefail

            APP_PATH="/var/www/api.tesotunes.com"
            SHARED_PATH="/var/www/tesotunes-shared"
            RELEASES_PATH="/var/www/tesotunes-releases"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            NEW_RELEASE="$RELEASES_PATH/$TIMESTAMP"
            DEPLOY_LOG_PATH="$SHARED_PATH/deploy-logs"
            MIGRATION_LOG="$DEPLOY_LOG_PATH/tesotunes-migrate-$TIMESTAMP.log"
            LIVE_HEALTH_URL="https://api.tesotunes.com/api/health"
            PREVIOUS_RELEASE=""
            SYMLINK_SWITCHED="false"

            step() {
              echo ""
              echo "==> $1"
            }

            current_release_target() {
              if [ -L "$APP_PATH" ]; then
                readlink -f "$APP_PATH"
              elif [ -d "$APP_PATH" ]; then
                printf '%s\n' "$APP_PATH"
              fi
            }

            assert_live_health() {
              local attempts="${1:-10}"
              local delay="${2:-5}"
              local status=""

              for i in $(seq 1 "$attempts"); do
                status=$(curl -s -o /dev/null -w "%{http_code}" "$LIVE_HEALTH_URL" || true)
                echo "Health attempt $i/$attempts: HTTP ${status:-000}"
                if [ "$status" = "200" ]; then
                  return 0
                fi
                sleep "$delay"
              done

              return 1
            }

            # Safety: bring app up if stuck in maintenance mode from a previous failed deploy
            sudo rm -f $SHARED_PATH/storage/framework/down 2>/dev/null || true
            PREVIOUS_RELEASE="$(current_release_target || true)"
            if [ -L "$APP_PATH" ] || [ -d "$APP_PATH" ]; then
              cd $APP_PATH
              php artisan up 2>/dev/null || true
            fi

            # Trap: ensure app comes back up even if deployment fails
            cleanup() {
              local exit_code=$?
              echo "❌ Deployment failed at command: ${BASH_COMMAND}"
              echo "❌ Exit code: ${exit_code}"
              if [ -f "$MIGRATION_LOG" ]; then
                echo "⚠️ Last migration log output:"
                tail -n 200 "$MIGRATION_LOG" || true
              fi
              if [ "$SYMLINK_SWITCHED" = "true" ] && [ -n "${PREVIOUS_RELEASE:-}" ] && [ -d "$PREVIOUS_RELEASE" ]; then
                echo "⚠️ Rolling back symlink to previous release: $PREVIOUS_RELEASE"
                ln -sfn "$PREVIOUS_RELEASE" "$APP_PATH" || true
              fi
              echo "⚠️ Deployment failed — ensuring app is brought back up..."
              sudo rm -f $SHARED_PATH/storage/framework/down 2>/dev/null || true
              if [ -L "$APP_PATH" ] || [ -d "$APP_PATH" ]; then
                cd $APP_PATH
                php artisan up 2>/dev/null || true
                sudo rm -f storage/framework/down 2>/dev/null || true
                php artisan config:clear 2>/dev/null || true
                php artisan route:clear 2>/dev/null || true
                sudo systemctl reload php8.4-fpm 2>/dev/null || true
              fi
              exit $exit_code
            }
            trap cleanup ERR

            step "Starting deployment"

            step "Preparing directories"
            mkdir -p $SHARED_PATH
            mkdir -p $SHARED_PATH/storage
            mkdir -p $DEPLOY_LOG_PATH
            mkdir -p $RELEASES_PATH
            mkdir -p $NEW_RELEASE

            # Extract new release
            step "Extracting release artifact"
            tar -xzf /tmp/deployment.tar.gz -C $NEW_RELEASE
            rm -f /tmp/deployment.tar.gz

            cd $NEW_RELEASE

            # ------------------------------------------------
            # Link shared files
            # ------------------------------------------------
            step "Linking shared environment and storage"
            if [ ! -f "$SHARED_PATH/.env" ]; then
              echo "❌ Missing .env in $SHARED_PATH"
              exit 1
            fi

            rm -f .env
            ln -sfn $SHARED_PATH/.env .env
            if [ ! -L ".env" ]; then
              echo "❌ Failed to create shared .env symlink"
              exit 1
            fi

            rm -rf storage
            ln -sfn $SHARED_PATH/storage storage

            # ------------------------------------------------
            # FIX: Required Laravel directories
            # ------------------------------------------------
            step "Preparing Laravel writable directories"
            mkdir -p bootstrap/cache
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p storage/logs
            mkdir -p storage/app/public

            chmod -R 775 storage
            chmod -R 775 bootstrap/cache

            # ------------------------------------------------
            # Storage symlink (needed for local file serving)
            # ------------------------------------------------
            step "Ensuring public storage symlink"
            php artisan storage:link --force 2>/dev/null || true

            # ------------------------------------------------
            # Install dependencies safely
            # ------------------------------------------------
            step "Installing production dependencies"
            composer install --no-dev --optimize-autoloader --no-interaction --no-scripts

            step "Discovering Laravel packages"
            php artisan package:discover --ansi

            step "Validating release can boot in CLI"
            php artisan about --only=environment

            step "Verifying candidate analytics routes exist before promotion"
            php artisan route:list --path=admin/analytics --no-ansi | tee "$DEPLOY_LOG_PATH/tesotunes-routes-$TIMESTAMP.log"

            # ------------------------------------------------
            # Run migrations
            # ------------------------------------------------
            step "Running database migrations"
            RESET_PRODUCTION_DB="${{ secrets.PRODUCTION_DB_RESET_ONCE }}"
            RESET_CONFIRM="${{ secrets.PRODUCTION_DB_RESET_CONFIRM }}"

            if [ "${RESET_PRODUCTION_DB:-}" = "true" ]; then
              if [ "${RESET_CONFIRM:-}" != "WIPE_PRODUCTION_DB" ]; then
                echo "❌ Refusing production reset: set PRODUCTION_DB_RESET_CONFIRM=WIPE_PRODUCTION_DB"
                exit 1
              fi

              echo "⚠️ Running one-time production database reset..."
              echo "Migration log file: $MIGRATION_LOG"
              php -d display_errors=1 artisan migrate:fresh --force -v --no-ansi 2>&1 | tee "$MIGRATION_LOG"
              php artisan db:seed --class='Database\\Seeders\\GenreSeeder' --force
            else
              echo "About to run production migrations..."
              echo "Migration log file: $MIGRATION_LOG"
              php -d display_errors=1 artisan migrate --force -v --no-ansi 2>&1 | tee "$MIGRATION_LOG"
            fi

            # ------------------------------------------------
            # Maintenance mode just before switching live release
            # ------------------------------------------------
            step "Putting current app into maintenance mode"
            if [ -L "$APP_PATH" ] || [ -d "$APP_PATH" ]; then
              cd $APP_PATH
              if ! php artisan down --retry=60 2>/dev/null; then
                echo "⚠️ Current live release could not enter maintenance mode; continuing with atomic symlink switch"
              fi
            fi

            # ------------------------------------------------
            # Atomic symlink switch
            # ------------------------------------------------
            step "Switching current release symlink"
            ln -sfn $NEW_RELEASE $APP_PATH
            SYMLINK_SWITCHED="true"
            CURRENT_TARGET=$(readlink -f "$APP_PATH")
            if [ "$CURRENT_TARGET" != "$NEW_RELEASE" ]; then
              echo "❌ Symlink switch failed: expected $NEW_RELEASE but got $CURRENT_TARGET"
              exit 1
            fi

            # ------------------------------------------------
            # Optimize (clear stale caches first)
            # ------------------------------------------------
            step "Clearing stale Laravel caches"
            cd $APP_PATH
            php artisan config:clear
            php artisan route:clear
            php artisan event:clear
            php artisan view:clear

            step "Rebuilding Laravel caches"
            php artisan config:cache
            php artisan route:cache
            php artisan event:cache

            # Ensure app is out of maintenance mode
            step "Bringing application back up"
            php artisan up || true
            sudo rm -f $SHARED_PATH/storage/framework/down 2>/dev/null || true
            sudo rm -f storage/framework/down 2>/dev/null || true

            # Set correct ownership for web server
            step "Fixing ownership and reloading services"
            sudo chown -R www-data:www-data $NEW_RELEASE 2>/dev/null || true
            sudo chown -R www-data:www-data $SHARED_PATH/storage 2>/dev/null || true

            # Reload PHP-FPM to clear opcache and realpath cache
            sudo systemctl reload php8.4-fpm || sudo systemctl reload php-fpm || true

            # Restart workers
            sudo supervisorctl restart tesotunes-worker:* || true

            # ------------------------------------------------
            # Verify promoted release is healthy before cleanup
            # ------------------------------------------------
            step "Verifying live health after symlink switch"
            if ! assert_live_health 12 5; then
              echo "❌ Live health check failed after symlink switch"
              exit 1
            fi

            step "Verifying promoted analytics routes"
            php artisan route:list --path=admin/analytics --no-ansi | tee -a "$DEPLOY_LOG_PATH/tesotunes-routes-$TIMESTAMP.log"

            # ------------------------------------------------
            # Cleanup old releases (keep 5)
            # ------------------------------------------------
            step "Cleaning up old releases"
            cd $RELEASES_PATH
            ls -t | tail -n +6 | xargs rm -rf 2>/dev/null || true

            echo "✅ Deployment successful!"

      # ---------------------------------------------------
      # Emergency cleanup: ensure app is NEVER left in maintenance mode
      # Runs even if the deploy step fails (script_stop kills ERR trap)
      # ---------------------------------------------------
      - name: Ensure app is out of maintenance mode
        if: always()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            SHARED_PATH="/var/www/tesotunes-shared"
            APP_PATH="/var/www/api.tesotunes.com"

            # Force-remove maintenance mode file from shared storage
            sudo rm -f $SHARED_PATH/storage/framework/down 2>/dev/null || true

            # Also try via artisan
            if [ -L "$APP_PATH" ] || [ -d "$APP_PATH" ]; then
              cd $APP_PATH
              php artisan up 2>/dev/null || true
              sudo rm -f storage/framework/down 2>/dev/null || true
            fi

            # Reload PHP-FPM to pick up any changes
            sudo systemctl reload php8.4-fpm 2>/dev/null || true

            echo "✅ Maintenance mode cleanup complete"

      # ---------------------------------------------------
      # Health Check
      # ---------------------------------------------------
      - name: Health check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.tesotunes.com/api/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ API healthy"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1
