name: Deploy to Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PHP_VERSION: '8.4'

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: tesotunes_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, zip, gd, sqlite3, redis, mysql, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Copy .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Laravel Pint
        run: ./vendor/bin/pint --test
        continue-on-error: true

      - name: Run tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: tesotunes_test
          DB_USERNAME: root
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: php artisan test --parallel
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        continue-on-error: true

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Run Composer audit
        run: composer audit
        continue-on-error: true

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: [tests, security-check]
    if: github.ref == 'refs/heads/main' && always()

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://api.tesotunes.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, zip

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Create deployment package
        run: |
          mkdir -p deployment
          rsync -av --exclude-from='.github/deploy-exclude.txt' \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='storage/logs' \
            ./ deployment/

      - name: Package application
        run: |
          tar -czf deployment.tar.gz -C deployment .

      - name: Upload deployment archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "deployment.tar.gz"
          target: "/tmp"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e

            APP_PATH="/var/www/api.tesotunes.com"
            SHARED_PATH="/var/www/tesotunes-shared"
            RELEASES_PATH="/var/www/tesotunes-releases"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            NEW_RELEASE="$RELEASES_PATH/$TIMESTAMP"

            echo "🚀 Starting deployment..."

            # ----------------------------------------------------------
            # First-time setup: migrate existing app into shared + releases structure
            # This block runs only once, then the directory becomes a symlink
            # ----------------------------------------------------------
            if [ -d "$APP_PATH" ] && [ ! -L "$APP_PATH" ]; then
              echo "📦 Migrating existing application to release-based deployment..."

              # Create shared directory for persistent files
              mkdir -p $SHARED_PATH

              # Move .env to shared (if it exists in the app)
              if [ -f "$APP_PATH/.env" ] && [ ! -f "$SHARED_PATH/.env" ]; then
                cp "$APP_PATH/.env" "$SHARED_PATH/.env"
                echo "  ✓ Copied .env to shared"
              fi

              # Move storage to shared (if not already there)
              if [ -d "$APP_PATH/storage" ] && [ ! -d "$SHARED_PATH/storage" ]; then
                cp -a "$APP_PATH/storage" "$SHARED_PATH/storage"
                echo "  ✓ Copied storage to shared"
              fi

              # Rename the existing app as the first release
              mkdir -p $RELEASES_PATH
              INITIAL_RELEASE="$RELEASES_PATH/initial_$(date +%Y%m%d_%H%M%S)"
              mv "$APP_PATH" "$INITIAL_RELEASE"
              echo "  ✓ Moved existing app to $INITIAL_RELEASE"

              # Create symlink pointing to the initial release
              ln -sfn "$INITIAL_RELEASE" "$APP_PATH"
              echo "  ✓ Created symlink: $APP_PATH -> $INITIAL_RELEASE"

              echo "✅ Migration complete. Continuing with deployment..."
            fi

            # Ensure directories exist
            mkdir -p $RELEASES_PATH
            mkdir -p $SHARED_PATH
            mkdir -p $SHARED_PATH/storage
            mkdir -p $NEW_RELEASE

            # Extract uploaded archive
            echo "📦 Extracting deployment package..."
            tar -xzf /tmp/deployment.tar.gz -C $NEW_RELEASE
            rm -f /tmp/deployment.tar.gz

            cd $NEW_RELEASE

            # Link shared .env
            ln -sfn $SHARED_PATH/.env .env

            # Link shared storage (remove the one from the archive first)
            rm -rf $NEW_RELEASE/storage
            ln -sfn $SHARED_PATH/storage storage

            # Install dependencies
            echo "📦 Installing dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            # Maintenance mode (on the CURRENT live release, if it exists)
            if [ -L "$APP_PATH" ]; then
              cd "$APP_PATH"
              php artisan down --retry=60 || true
              cd $NEW_RELEASE
            fi

            # Run migrations
            echo "🗄️  Running database migrations..."
            php artisan migrate --force

            # Switch symlink to new release (atomic swap)
            echo "🔗 Switching to new release..."
            ln -sfn $NEW_RELEASE $APP_PATH

            # Optimize
            echo "⚡ Optimizing application..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Bring app back up
            php artisan up

            # Restart workers
            echo "🔄 Restarting workers..."
            sudo supervisorctl restart tesotunes-worker:* || true

            # Cleanup old releases (keep last 5)
            echo "🧹 Cleaning up old releases..."
            cd $RELEASES_PATH
            ls -t | tail -n +6 | xargs rm -rf 2>/dev/null || true

            echo "✅ Deployment complete!"
            echo "🌐 TesoTunes API is live at https://api.tesotunes.com"

      - name: Health check
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" https://api.tesotunes.com/api/health)
          if [ $response -eq 200 ]; then
            echo "✅ Health check passed! API is responding."
          else
            echo "❌ Health check failed! HTTP status: $response"
            exit 1
          fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && needs.deploy.result == 'failure'
    needs: [deploy]

    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            APP_PATH="/var/www/api.tesotunes.com"
            RELEASES_PATH="/var/www/tesotunes-releases"
            SHARED_PATH="/var/www/tesotunes-shared"

            echo "🔄 Starting rollback..."

            # Find the previous release (second newest)
            CURRENT=$(readlink -f $APP_PATH)
            PREVIOUS=$(ls -t $RELEASES_PATH | head -2 | tail -1)

            if [ -z "$PREVIOUS" ] || [ "$RELEASES_PATH/$PREVIOUS" = "$CURRENT" ]; then
              echo "❌ No previous release found for rollback!"
              exit 1
            fi

            PREV_RELEASE="$RELEASES_PATH/$PREVIOUS"
            echo "Rolling back to: $PREV_RELEASE"

            # Ensure shared links exist in previous release
            cd $PREV_RELEASE
            ln -sfn $SHARED_PATH/.env .env
            rm -rf storage 2>/dev/null || true
            ln -sfn $SHARED_PATH/storage storage

            # Maintenance mode on current
            cd $APP_PATH
            php artisan down --retry=60 || true

            # Switch symlink to previous release
            ln -sfn $PREV_RELEASE $APP_PATH

            cd $APP_PATH

            # Re-optimize
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Restart workers
            sudo supervisorctl restart tesotunes-worker:* || true

            # Bring back up
            php artisan up

            echo "✅ Rollback completed! Now running: $PREV_RELEASE"
