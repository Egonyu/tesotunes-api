name: Security Hardening Gate → Promote to main

# Every push to security/critical-hardening runs the full test + security suite.
# If all jobs pass, the branch is automatically merged into main, which in turn
# triggers deploy-production.yml to deploy to the live server.
#
# Branch protection note:
#   If `main` has branch protection rules that require PR reviews or status
#   checks, set the PROMOTION_TOKEN repository secret to a Personal Access Token
#   (PAT) with `repo` scope. Otherwise GITHUB_TOKEN is sufficient.

on:
  push:
    branches:
      - security/critical-hardening
  workflow_dispatch:

permissions:
  contents: write

env:
  PHP_VERSION: '8.4'

jobs:
  # -----------------------------------------------------------------------
  # 1. Run the full test suite
  # -----------------------------------------------------------------------
  tests:
    name: Tests (PHP ${{ env.PHP_VERSION }})
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: music_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, zip, gd, sqlite3, redis, mysql, bcmath, intl
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Setup test environment
        run: |
          cp .env.testing .env
          php artisan key:generate --env=testing

      - name: Create test database
        run: bash scripts/ci/create_test_db_mysql.sh
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: music_test
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_ROOT_USER: root
          DB_ROOT_PASSWORD: root

      - name: Run tests
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: music_test
          DB_USERNAME: root
          DB_PASSWORD: root
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: composer test

  # -----------------------------------------------------------------------
  # 2. Static analysis / code style
  # -----------------------------------------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: phpstan, psalm

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run Laravel Pint
        run: ./vendor/bin/pint --test

      - name: Run PHPStan (if configured)
        run: |
          if [ -f phpstan.neon ]; then
            vendor/bin/phpstan analyse
          fi
        continue-on-error: true

  # -----------------------------------------------------------------------
  # 3. Security gate (route/model audits + dependency CVE scan)
  # -----------------------------------------------------------------------
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: music_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run Composer audit
        run: composer audit

      - name: Setup application for route audit
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: music_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: |
          cp .env.testing .env 2>/dev/null || cp .env.example .env
          php artisan key:generate --force

      - name: Run database migrations for audits
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: music_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Security - Route authentication audit
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: music_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan security:audit-routes --fail-on-issues

      - name: Security - Model $fillable audit
        run: php artisan security:audit-models --fail-on-issues

      - name: Security - Sanctum token expiration check
        run: |
          if grep -q "'expiration' => null" config/sanctum.php; then
            echo "::error::CRITICAL: Sanctum token expiration is null — tokens never expire!"
            exit 1
          fi
          echo "✅ Sanctum token expiration is set"

      - name: Security - Debug/test endpoint check
        run: |
          FOUND=0
          if grep -rn "test-upload\|debug.*route" routes/ --include="*.php" | grep -v "REMOVED\|//"; then
            echo "::warning::Debug/test endpoints found in routes"
            FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then
            echo "::error::Debug endpoints must be removed before production deployment"
            exit 1
          fi
          echo "✅ No debug endpoints found"

      - name: Security - Check for hardcoded secrets
        run: |
          if grep -rn "sk-proj-\|sk_live_\|pk_live_\|AKIA" --include="*.php" --include="*.env" app/ config/ routes/ 2>/dev/null; then
            echo "::error::Hardcoded secrets found in source code!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  # -----------------------------------------------------------------------
  # 4. Promote to main — only runs after ALL three gates pass
  # -----------------------------------------------------------------------
  promote-to-main:
    name: Promote to main
    needs: [tests, code-quality, security]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PROMOTION_TOKEN (PAT) if main is branch-protected; otherwise
          # GITHUB_TOKEN is sufficient for unprotected main branches.
          token: ${{ secrets.PROMOTION_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure Git bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge security/critical-hardening into main
        run: |
          git fetch origin main
          git checkout main
          git merge --no-ff origin/security/critical-hardening \
            -m "chore: promote security/critical-hardening → main (all gates passed)"
          git push origin main
